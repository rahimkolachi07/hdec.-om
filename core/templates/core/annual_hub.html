<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Annual Plan — HDEC 1100MW Al Henakiya</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#030711;--s:rgba(255,255,255,.03);--s2:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.07);--text:#e2e8f5;--tm:rgba(226,232,245,.45);--td:rgba(226,232,245,.2);
      --accent:#3b9eff;--a2:#00e5c8;--a3:#a259ff;
      --fd:'Plus Jakarta Sans',sans-serif;--fb:'Inter',sans-serif;
    }
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
    canvas#cv{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.32}
    .wrap{position:relative;z-index:1}

    /* TOPBAR */
    .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding:14px 40px;border-bottom:1px solid var(--border);background:rgba(3,7,17,.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:200}
    .tl{display:flex;align-items:center;gap:10px}
    .back{padding:7px 14px;border-radius:30px;border:1px solid var(--border);background:var(--s);color:var(--tm);font-size:12.5px;text-decoration:none;transition:all .2s}
    .back:hover{color:var(--text);border-color:rgba(59,158,255,.3)}
    .pt{font-family:var(--fd);font-size:17px;font-weight:700}
    .pt span{color:var(--accent
