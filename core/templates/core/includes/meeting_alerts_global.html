  html[data-theme=ocean] .hdec-theme-dot,html[data-theme=executive] .hdec-theme-dot,html[data-theme=ivory] .hdec-theme-dot,html[data-theme=mint] .hdec-theme-dot,html[data-theme=rose] .hdec-theme-dot{box-shadow:0 0 0 2px rgba(0,0,0,.12)!important}

<script>
(function(){
  if(window.__hdecSmartBackSetup) return;
  window.__hdecSmartBackSetup = true;

  const TRAIL_KEY = 'hdec-nav-trail';

  function currentPath(){
    return `${window.location.pathname}${window.location.search}${window.location.hash}`;
  }

  function readTrail(){
    try{
      const saved = JSON.parse(sessionStorage.getItem(TRAIL_KEY) || '[]');
      return Array.isArray(saved) ? saved.filter(item => typeof item === 'string' && item) : [];
    }catch(_){
      return [];
    }
  }

  function writeTrail(trail){
    try{
      sessionStorage.setItem(TRAIL_KEY, JSON.stringify(trail.slice(-40)));
    }catch(_){}
  }

  function rememberCurrentPage(){
    const now = currentPath();
    const trail = readTrail();
    if(trail[trail.length - 1] !== now){
      trail.push(now);
      writeTrail(trail);
    }
  }

  function previousTrailPath(){
    const now = currentPath();
    const trail = readTrail();
    for(let i = trail.length - 2; i >= 0; i -= 1){
      if(trail[i] && trail[i] !== now) return trail[i];
    }
    return '';
  }

  function sameOriginReferrer(){
    try{
      if(!document.referrer) return '';
      const prev = new URL(document.referrer, window.location.origin);
      if(prev.origin !== window.location.origin) return '';
      const prevPath = `${prev.pathname}${prev.search}${prev.hash}`;
      return prevPath !== currentPath() ? prev.href : '';
    }catch(_){
      return '';
    }
  }

  function isSmartBackLink(link){
    if(!link || link.tagName !== 'A') return false;
    if(link.dataset.smartBack === 'off') return false;
    if(link.target && link.target !== '_self') return false;
    if(link.hasAttribute('download')) return false;

    const href = String(link.getAttribute('href') || '').trim();
    if(link.dataset.smartBack !== undefined) return true;
    if(/^javascript:\s*history\.back\(\)\s*;?$/i.test(href)) return true;

    const text = String(link.textContent || '').replace(/\s+/g, ' ').trim();
    return text.startsWith('←');
  }

  window.hdecSmartBack = function(event, fallback){
    if(event && typeof event.preventDefault === 'function') event.preventDefault();

    const fallbackUrl = String(fallback || '').trim() || '/';
    const previousUrl = sameOriginReferrer();
    if(previousUrl){
      if(window.history.length > 1){
        window.history.back();
        return false;
      }
      window.location.href = previousUrl;
      return false;
    }

    const trailPath = previousTrailPath();
    if(trailPath){
      window.location.href = trailPath;
      return false;
    }

    window.location.href = /^javascript:/i.test(fallbackUrl) ? '/' : fallbackUrl;
    return false;
  };

  window.goBack = window.hdecSmartBack;

  rememberCurrentPage();

  document.addEventListener('click', function(event){
    if(event.defaultPrevented || event.button !== 0) return;
    if(event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;

    const link = event.target.closest('a');
    if(!isSmartBackLink(link)) return;

    const onclick = String(link.getAttribute('onclick') || '');
    if(/hdecSmartBack|goBack\(/.test(onclick)) return;

    window.hdecSmartBack(event, link.dataset.backFallback || link.href || '/');
  }, true);
})();
</script>

<script>
(function(){
  if(window.__hdecMtgGlobalAlertsRunning) return;
  window.__hdecMtgGlobalAlertsRunning = true;

  const ON_MEETING_PAGE = window.location.pathname.includes('/meeting-room');
  const RIGHT_SELECTORS = [
    '.topbar-right',
    '.topbar-r',
    '.topbar-actions',
    '.tb-right',
    'header .tr',
    'nav.topbar-nav',
  ];
  const THEME_OPTIONS = [
    {id:'dark',name:'Void',color:'#3b9eff',desc:'Dark space'},
    {id:'aurora',name:'Aurora',color:'#a78bfa',desc:'Purple dream'},
    {id:'forge',name:'Forge',color:'#f97316',desc:'Industrial heat'},
    {id:'ocean',name:'Ocean',color:'#0ea5e9',desc:'Light and clear'},
    {id:'terminal',name:'Terminal',color:'#00ff41',desc:'Matrix code'},
    {id:'executive',name:'Executive',color:'#b45309',desc:'Warm boardroom'},
    {id:'ivory',name:'Ivory',color:'#6366f1',desc:'Clean and bright'},
    {id:'mint',name:'Mint',color:'#10b981',desc:'Fresh and calm'},
    {id:'rose',name:'Rose',color:'#f43f5e',desc:'Soft contrast'},
    {id:'crimson',name:'Crimson',color:'#f87171',desc:'Bold dark red'},
    {id:'dusk',name:'Dusk',color:'#818cf8',desc:'Blue twilight'},
  ];

  function _themeMeta(id){
    return THEME_OPTIONS.find(item => item.id === id) || THEME_OPTIONS[0];
  }

  function _storedTheme(){
    try{
      return localStorage.getItem('hdec-theme') || 'dark';
    }catch(_){
      return 'dark';
    }
  }

  function _findTopbarTarget(){
    for(const sel of RIGHT_SELECTORS){
      const node = document.querySelector(sel);
      if(node) return node;
    }
    const anchor = document.querySelector('.topbar-user, .user-pill, .logout-btn');
    return anchor && anchor.parentNode ? anchor.parentNode : null;
  }

  function _syncThemeUi(themeId){
    const theme = _themeMeta(themeId);
    document.documentElement.setAttribute('data-theme', theme.id);

    const pickerDot = document.getElementById('themePickerDot');
    const pickerLabel = document.getElementById('themePickerLabel');
    if(pickerDot) pickerDot.style.background = theme.color;
    if(pickerLabel) pickerLabel.textContent = theme.name;

    const meetingDot = document.getElementById('tDot');
    const meetingLabel = document.getElementById('tLbl');
    if(meetingDot) meetingDot.style.background = theme.color;
    if(meetingLabel) meetingLabel.textContent = theme.name;

    const fallbackDot = document.getElementById('hdecThemeDot');
    const fallbackLabel = document.getElementById('hdecThemeLbl');
    if(fallbackDot) fallbackDot.style.background = theme.color;
    if(fallbackLabel) fallbackLabel.textContent = theme.name;

    document.querySelectorAll('.theme-pick-item[data-tid]').forEach(item => {
      const active = item.dataset.tid === theme.id;
      item.classList.toggle('active-theme', active);
      const check = document.getElementById(`chk-${item.dataset.tid}`);
      if(check) check.textContent = active ? '✓' : '';
    });
    THEME_OPTIONS.forEach(item => {
      const check = document.getElementById(`tc-${item.id}`);
      if(check) check.textContent = item.id === theme.id ? '✓' : '';
    });
    document.querySelectorAll('.hdec-theme-item[data-theme-id]').forEach(item => {
      const active = item.dataset.themeId === theme.id;
      item.classList.toggle('active-theme', active);
      const check = item.querySelector('.hdec-theme-check');
      if(check) check.textContent = active ? '✓' : '';
    });
  }

  function _applyThemeShared(themeId, persist){
    const theme = _themeMeta(themeId);
    if(persist !== false){
      try{ localStorage.setItem('hdec-theme', theme.id); }catch(_){}
    }
    _syncThemeUi(theme.id);
    return theme.id;
  }

  function _wrapThemeApply(){
    if(typeof window.applyTheme === 'function' && !window.applyTheme.__hdecThemeWrapped){
      const originalApplyTheme = window.applyTheme;
      const wrappedApplyTheme = function(themeId){
        const result = originalApplyTheme.call(this, themeId);
        _applyThemeShared(themeId, false);
        return result;
      };
      wrappedApplyTheme.__hdecThemeWrapped = true;
      window.applyTheme = wrappedApplyTheme;
    }else if(typeof window.applyTheme !== 'function'){
      const fallbackApplyTheme = function(themeId){
        return _applyThemeShared(themeId, true);
      };
      fallbackApplyTheme.__hdecThemeWrapped = true;
      window.applyTheme = fallbackApplyTheme;
    }
  }

  function _buildFallbackThemeDropdown(dropdown){
    if(!dropdown || dropdown.childElementCount) return;
    dropdown.innerHTML = THEME_OPTIONS.map(theme => `
      <div class="hdec-theme-item" data-theme-id="${theme.id}">
        <span class="hdec-theme-swatch" style="background:${theme.color}"></span>
        <div>
          <div class="hdec-theme-name">${theme.name}</div>
          <div class="hdec-theme-desc">${theme.desc}</div>
        </div>
        <span class="hdec-theme-check"></span>
      </div>`).join('');
    dropdown.querySelectorAll('.hdec-theme-item').forEach(item => {
      item.addEventListener('click', () => {
        window.applyTheme(item.dataset.themeId);
        dropdown.hidden = true;
      });
    });
  }

  function _ensureThemePicker(){
    if(document.querySelector('#themeShell, .theme-shell, [data-hdec-theme-picker], .theme-btn, .theme-pick-btn')) return;
    const target = _findTopbarTarget();
    if(!target) return;

    const shell = document.createElement('div');
    shell.className = 'hdec-theme-shell';
    shell.setAttribute('data-hdec-theme-picker', '1');
    shell.innerHTML = `
      <button class="hdec-theme-btn" id="hdecThemeBtn" type="button">
        <span class="hdec-theme-dot" id="hdecThemeDot"></span>
        <span id="hdecThemeLbl">Theme</span>
        <span class="hdec-theme-caret">▾</span>
      </button>
      <div class="hdec-theme-dropdown" id="hdecThemeDropdown" hidden></div>`;

    target.insertBefore(shell, target.firstChild);
    const button = shell.querySelector('#hdecThemeBtn');
    const dropdown = shell.querySelector('#hdecThemeDropdown');
    _buildFallbackThemeDropdown(dropdown);
    button.addEventListener('click', () => {
      dropdown.hidden = !dropdown.hidden;
      if(!dropdown.hidden) _syncThemeUi(_storedTheme());
    });
  }

  // ── DOM injection: put bell + pill into the topbar ───────────────────────
  function _setupBar(){
    const gbell = document.getElementById('hdec-gbar-bell');
    const pill  = document.getElementById('hdec-online-pill');
    if (!gbell || !pill) return;

    // Find any [data-notification-shell] that is NOT inside our gbell wrapper
    const navBell = document.querySelector('[data-notification-shell]');
    const bellIsOurs = gbell.contains(navBell);

    if (navBell && !bellIsOurs) {
      // Page already has bell in its topbar (CMMS pages)
      // Just insert the online pill right after the existing bell
      navBell.parentNode.insertBefore(pill, navBell.nextSibling);
      pill.style.display = 'inline-flex';
      return;
    }

    // No nav bell — find the topbar right container to inject bell + pill into
    const target = _findTopbarTarget();

    if (target) {
      // Inject bell first, then pill, at the start of the right container
      gbell.style.display = 'flex';
      target.insertBefore(pill,  target.firstChild);
      target.insertBefore(gbell, target.firstChild);
      pill.style.display = 'inline-flex';
    } else {
      // Try inserting before a known right-side element (e.g. .topbar-user in meeting_hub)
      const anchor = document.querySelector('.topbar-user, .user-pill, .logout-btn');
      if (anchor && anchor.parentNode) {
        gbell.style.display = 'flex';
        anchor.parentNode.insertBefore(pill,  anchor);
        anchor.parentNode.insertBefore(gbell, anchor);
        pill.style.display = 'inline-flex';
      } else {
        // Last resort: fixed bottom-right (never overlaps anything)
        const fb = document.getElementById('hdec-gbar-fallback');
        if (fb) {
          gbell.style.display = 'flex';
          fb.appendChild(gbell);
          fb.appendChild(pill);
          pill.style.display = 'inline-flex';
          fb.style.display = 'flex';
        }
      }
    }

    // Init the notification bell JS
    if (typeof window.HDECNotificationsLoaded === 'function') {
      window.HDECNotificationsLoaded();
    }
  }

  // ── Audio ────────────────────────────────────────────────────────────────
  let _aC=null;
  function _ac(){ if(!_aC){ try{ _aC=new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return _aC; }
  function playMsgTone(){
    try{
      const c=_ac(); if(!c) return;
      const o=c.createOscillator(),g=c.createGain();
      o.connect(g); g.connect(c.destination); o.type='sine';
      o.frequency.setValueAtTime(880,c.currentTime);
      o.frequency.exponentialRampToValueAtTime(660,c.currentTime+0.18);
      g.gain.setValueAtTime(0.22,c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.4);
      o.start(); o.stop(c.currentTime+0.4);
    }catch(e){}
  }
  let _ringInt=null;
  function _ringOnce(){
    try{
      const c=_ac(); if(!c) return;
      [[880,0],[1100,0.11],[880,0.26],[1100,0.37]].forEach(([f,w])=>{
        const o=c.createOscillator(),g=c.createGain();
        o.connect(g); g.connect(c.destination); o.type='sine'; o.frequency.value=f;
        g.gain.setValueAtTime(0,c.currentTime+w);
        g.gain.linearRampToValueAtTime(0.3,c.currentTime+w+0.05);
        g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+w+0.2);
        o.start(c.currentTime+w); o.stop(c.currentTime+w+0.22);
      });
    }catch(e){}
  }
  function startRing(){ if(!_ringInt){ _ringOnce(); _ringInt=setInterval(_ringOnce,2800); } }
  function stopRing(){ if(_ringInt){ clearInterval(_ringInt); _ringInt=null; } }
  window.hdecMtgPlayRingtone = startRing;

  // ── Online pill ──────────────────────────────────────────────────────────
  function updateOnlinePill(users, count){
    const lbl  = document.getElementById('hdec-online-label');
    const list = document.getElementById('hdec-online-list');
    if(lbl)  lbl.textContent = count + ' online';
    if(!list) return;
    if(!users || !users.length){
      list.innerHTML = '<div class="hdec-ol-empty">No one else online</div>';
    } else {
      list.innerHTML = users.map(u =>
        `<div class="hdec-ol-item"><span class="hdec-ol-dot"></span>${_esc(u.name||u.username)}</div>`
      ).join('');
    }
  }

  // ── Message toast ────────────────────────────────────────────────────────
  function showMsgToast(thread){
    const wrap=document.getElementById('hdec-mtg-toasts'); if(!wrap) return;
    const label=thread.type==='dm'?(thread.peer_name||'Message'):(thread.group_name||'Group');
    const tag=thread.type==='dm'?'Direct Message':'Group Message';
    const count=thread.count>1?` (${thread.count})`:'';
    const t=document.createElement('div'); t.className='hdec-mtg-toast';
    t.innerHTML=`<div class="hdec-mtg-toast-head">
  <span class="hdec-mtg-toast-icon">💬</span>
  <span class="hdec-mtg-toast-from">${_esc(label+count)}</span>
  <span class="hdec-mtg-toast-tag">${_esc(tag)}</span>
  <button class="hdec-mtg-toast-close" title="Dismiss">✕</button>
</div>
${thread.preview?`<div class="hdec-mtg-toast-msg">${_esc(thread.preview)}</div>`:''}
<div class="hdec-mtg-toast-foot"><button class="hdec-mtg-toast-view">Open Meeting Room →</button></div>`;
    t.querySelector('.hdec-mtg-toast-close').addEventListener('click',e=>{ e.stopPropagation(); _dismiss(t); });
    t.querySelector('.hdec-mtg-toast-view').addEventListener('click',()=>{ window.location.href='/meeting-room/'; });
    wrap.appendChild(t);
    t._dt=setTimeout(()=>_dismiss(t),10000);
  }
  function _dismiss(el){ clearTimeout(el._dt); el.style.opacity='0'; el.style.transform='translateY(12px)'; el.style.transition='opacity .35s,transform .35s'; setTimeout(()=>{ if(el.parentNode) el.parentNode.removeChild(el); },360); }

  // ── Call popup ───────────────────────────────────────────────────────────
  let _activeCallId=null,_callTmo=null;
  function showCallPopup(call){
    _activeCallId=call.id;
    const popup=document.getElementById('hdec-call-popup'),bg=document.getElementById('hdec-call-popup-backdrop');
    if(!popup) return;
    const name=call.caller_name||call.caller||'Someone';
    document.getElementById('hdec-call-av').textContent=name.charAt(0).toUpperCase();
    document.getElementById('hdec-call-av').style.background=_aColor(call.caller||'');
    document.getElementById('hdec-call-name').textContent=name;
    document.getElementById('hdec-call-type').textContent=call.call_type==='video'?'📹 Incoming Video Call':'🎙️ Incoming Audio Call';
    popup.style.display='block'; if(bg) bg.style.display='block';
    startRing(); _callTmo=setTimeout(hideCallPopup,36000);
  }
  function hideCallPopup(){
    _activeCallId=null; stopRing();
    const popup=document.getElementById('hdec-call-popup'),bg=document.getElementById('hdec-call-popup-backdrop');
    if(popup) popup.style.display='none'; if(bg) bg.style.display='none';
    if(_callTmo){ clearTimeout(_callTmo); _callTmo=null; }
  }
  document.getElementById('hdec-call-ans')?.addEventListener('click',()=>{ hideCallPopup(); window.location.href='/meeting-room/'; });
  document.getElementById('hdec-call-dec')?.addEventListener('click',async()=>{
    const id=_activeCallId; hideCallPopup();
    try{ await fetch(`/api/meeting/calls/${id}/`,{method:'PATCH',headers:{'Content-Type':'application/json','X-CSRFToken':_csrf()},body:JSON.stringify({status:'declined'})}); }catch(e){}
  });

  // ── State ────────────────────────────────────────────────────────────────
  let _prevCounts={},_prevUnreadTotal=-1,_prevCallId=null,_seenCalls=new Set(),_initialised=false;

  // ── Poll ─────────────────────────────────────────────────────────────────
  async function poll(){
    try{
      const r=await fetch('/api/meeting/global-alerts/',{headers:{'X-Requested-With':'XMLHttpRequest'}});
      if(!r.ok) return;
      const d=await r.json();
      updateOnlinePill(d.online_users||[], d.online_count||0);

      const unreadTotal = d.unread_total||0;

      if(!ON_MEETING_PAGE){
        const threads=d.unread_threads||[];
        if(_initialised){
          for(const t of threads){
            if((t.count||0)>(_prevCounts[t.thread_id]||0)){ playMsgTone(); showMsgToast(t); }
          }
        }
        const nm={}; for(const t of threads) nm[t.thread_id]=t.count;
        _prevCounts=nm;

        // Refresh bell badge whenever meeting unread count changes (covers first load + new msgs)
        if(unreadTotal !== _prevUnreadTotal){
          _prevUnreadTotal = unreadTotal;
          if(typeof window.hdecBellRefresh==='function') window.hdecBellRefresh();
        }
      }

      const call=d.pending_call;
      if(call&&call.status==='ringing'&&!_seenCalls.has(call.id)){
        _seenCalls.add(call.id); _prevCallId=call.id;
        if(ON_MEETING_PAGE){ if(typeof window.hdecMtgPlayRingtone==='function') window.hdecMtgPlayRingtone(); }
        else showCallPopup(call);
      } else if(!call&&_prevCallId){
        _prevCallId=null;
        if(!ON_MEETING_PAGE) hideCallPopup(); else stopRing();
      }
      _initialised=true;
    }catch(e){}
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function _esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  function _csrf(){ return document.cookie.split(';').map(p=>p.trim()).find(p=>p.startsWith('csrftoken='))?.split('=')[1]||''; }
  function _aColor(s){ const cs=['#3b9eff','#a78bfa','#f97316','#22c55e','#ef4444','#ec4899','#f59e0b','#06b6d4']; let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))&0xffff; return cs[h%cs.length]; }

  // ── Theme-dropdown z-index fix ───────────────────────────────────────────
  // backdrop-filter on topbars creates stacking contexts that trap dropdowns.
  // When any .theme-pick-dropdown or #tDropdown is shown, portal it to body.
  function _fixThemeDropdowns(){
    document.querySelectorAll('.theme-pick-btn, .theme-btn, .hdec-theme-btn').forEach(btn => {
      if(btn.__hdecThemeFixed) return;
      btn.__hdecThemeFixed = true;
      const dropdown = btn.nextElementSibling || btn.parentElement?.querySelector('.theme-pick-dropdown, #tDropdown, .hdec-theme-dropdown');
      if(!dropdown) return;
      // Move dropdown to body with fixed positioning when visible
      const origParent = dropdown.parentNode;
      const origNextSib = dropdown.nextSibling;
      const _origStyle = dropdown.getAttribute('style') || '';
      function _showPortal(){
        const rect = btn.getBoundingClientRect();
        dropdown.style.cssText = `position:fixed!important;z-index:99999!important;top:${rect.bottom+4}px;right:${window.innerWidth-rect.right}px;left:auto`;
        document.body.appendChild(dropdown);
      }
      function _hidePortal(){
        dropdown.style.cssText = _origStyle;
        if(origNextSib) origParent.insertBefore(dropdown, origNextSib);
        else origParent.appendChild(dropdown);
      }
      // Observe visibility changes
      const observer = new MutationObserver(() => {
        const hidden = dropdown.hidden || dropdown.style.display==='none' || dropdown.hasAttribute('hidden');
        if(!hidden && dropdown.parentNode !== document.body) _showPortal();
        else if(hidden && dropdown.parentNode === document.body) _hidePortal();
      });
      observer.observe(dropdown, {attributes:true, attributeFilter:['hidden','style']});
    });
  }

  function _closeFallbackThemeDropdown(event){
    const dropdown = document.getElementById('hdecThemeDropdown');
    if(!dropdown || dropdown.hidden) return;
    if(event.target.closest('[data-hdec-theme-picker]') || event.target.closest('#hdecThemeDropdown')) return;
    dropdown.hidden = true;
  }

  // Run after DOM is ready
  window.addEventListener('storage', event => {
    if(event.key !== 'hdec-theme') return;
    _applyThemeShared(event.newValue || 'dark', false);
  });
  document.addEventListener('click', _closeFallbackThemeDropdown);
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', ()=>{
      _wrapThemeApply();
      _setupBar();
      _ensureThemePicker();
      _syncThemeUi(_storedTheme());
      _fixThemeDropdowns();
    });
  } else {
    _wrapThemeApply();
    _setupBar();
    _ensureThemePicker();
    _syncThemeUi(_storedTheme());
    _fixThemeDropdowns();
  }

  poll();
  setInterval(poll, 20000);
})();
</script>
{% endif %}
