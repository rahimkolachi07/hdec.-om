<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Store - {{ project.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#04060f;--s:rgba(255,255,255,.03);--s2:rgba(255,255,255,.06);--border:rgba(255,255,255,.08);--accent:#ef4444;--a2:#22c55e;--text:#e8edf5;--tm:rgba(232,237,245,.45);--fd:'Plus Jakarta Sans',sans-serif;--fb:'Inter',sans-serif;--r:16px}
    body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh}
    #cv{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.24}
    .wrap{position:relative;z-index:1}
    .topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:14px 40px;border-bottom:1px solid var(--border);background:rgba(4,6,15,.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:100}
    .tl{display:flex;align-items:center;gap:10px}
    .back{padding:6px 13px;border-radius:30px;border:1px solid var(--border);background:var(--s);color:var(--tm);font-size:12px;text-decoration:none;transition:all .2s}
    .back:hover{color:var(--text)}
    .page-title{font-family:var(--fd);font-size:17px;font-weight:700}.page-title span{color:var(--accent)}
    .topbar-actions{display:flex;align-items:center;gap:8px}
    .act-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:30px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--fb);transition:all .2s;border:1px solid}
    .btn-new{background:linear-gradient(135deg,var(--accent),#b91c1c);color:#fff;border-color:transparent}
    .btn-new:hover{box-shadow:0 4px 16px rgba(239,68,68,.35);transform:translateY(-1px)}
    .main{padding:28px 40px 60px;max-width:1280px;margin:0 auto}
    .table-wrap{background:var(--s);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
    .store-table{width:100%;border-collapse:collapse}
    .store-table thead th{padding:11px 16px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--tm);font-weight:600;border-bottom:1px solid var(--border);background:rgba(255,255,255,.025);white-space:nowrap}
    .store-table tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .15s}
    .store-table tbody tr:hover{background:rgba(255,255,255,.03)}
    .store-table td{padding:13px 16px;font-size:13px;vertical-align:middle}
    .item-name{font-weight:600;margin-bottom:2px}
    .item-details{font-size:11.5px;color:var(--tm);max-width:320px;line-height:1.45}
    .status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11.5px;font-weight:600;border:1px solid;white-space:nowrap}
    .status-given{background:rgba(239,68,68,.1);color:#f87171;border-color:rgba(239,68,68,.25)}
    .status-returned{background:rgba(34,197,94,.1);color:#4ade80;border-color:rgba(34,197,94,.25)}
    .thumbs{display:flex;gap:6px;flex-wrap:wrap}
    .thumbs img{width:34px;height:34px;border-radius:8px;object-fit:cover;border:1px solid rgba(255,255,255,.08)}
    .row-actions{display:flex;gap:6px}
    .row-btn{padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;border:1px solid;cursor:pointer;font-family:var(--fb);transition:all .15s}
    .row-edit{background:rgba(59,158,255,.1);border-color:rgba(59,158,255,.25);color:#7ec3ff}
    .row-edit:hover{background:rgba(59,158,255,.22)}
    .row-del{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#f87171}
    .row-del:hover{background:rgba(239,68,68,.2)}
    .empty-state{text-align:center;padding:70px 20px;color:rgba(232,237,245,.22)}
    .empty-state .ico{font-size:52px;margin-bottom:14px}
    .empty-state p{font-size:14px;color:var(--tm);margin-bottom:18px}
    .modal-bg{position:fixed;inset:0;z-index:9000;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);display:none;align-items:center;justify-content:center;padding:16px}
    .modal-bg.open{display:flex}
    .modal{background:#0c1120;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:32px;width:100%;max-width:640px;position:relative;box-shadow:0 40px 100px rgba(0,0,0,.6);max-height:90vh;overflow-y:auto}
    .modal h2{font-family:var(--fd);font-size:18px;font-weight:700;margin-bottom:5px}
    .modal .sub{font-size:13px;color:var(--tm);margin-bottom:22px}
    .modal-close{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:8px;border:none;background:var(--s);color:var(--tm);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
    .modal-close:hover{color:#f87171;background:rgba(239,68,68,.15)}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-field{margin-bottom:16px}
    .form-field label{display:block;font-size:11.5px;font-weight:600;color:var(--tm);margin-bottom:7px;text-transform:uppercase;letter-spacing:.6px}
    .form-field input,.form-field select,.form-field textarea{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:13.5px;font-family:var(--fb);outline:none;transition:border-color .2s}
    .form-field textarea{resize:vertical;min-height:90px}
    .form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:rgba(59,158,255,.4)}
    .upload-box{border:1px dashed var(--border);border-radius:12px;padding:14px;background:rgba(255,255,255,.015)}
    .upload-box input{padding:0;border:none;background:none}
    .preview-grid{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .preview-item{position:relative}
    .preview-item img{width:64px;height:64px;border-radius:10px;object-fit:cover;border:1px solid rgba(255,255,255,.08)}
    .preview-item button{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.95);color:#fff;cursor:pointer;font-size:11px}
    .modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:24px}
    .btn-cancel{padding:8px 16px;border-radius:10px;background:var(--s);border:1px solid var(--border);color:var(--tm);font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb)}
    .btn-save{padding:8px 20px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#b91c1c);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--fb)}
    .toast{position:fixed;top:80px;right:24px;z-index:9999;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;border:1px solid;display:none;animation:fadeIn .3s ease}
    .toast.success{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:#4ade80}
    .toast.error{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#f87171}
    @keyframes fadeIn{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:none}}
    @media(max-width:768px){.topbar{padding:12px 16px}.page-title{font-size:14px}.main{padding:16px 16px 60px}.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}.store-table{min-width:900px}.modal{padding:20px;border-radius:14px}.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="toast" class="toast"></div>

<div id="storeModal" class="modal-bg">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Add Store Item</h2>
    <p class="sub">Manage equipment issue and return records without changing any existing modules.</p>
    <input type="hidden" id="itemId">
    <div class="form-row">
      <div class="form-field">
        <label>Equipment Name *</label>
        <input type="text" id="fName" placeholder="Equipment / item name">
      </div>
      <div class="form-field">
        <label>Date *</label>
        <input type="date" id="fDate">
      </div>
    </div>
    <div class="form-row">
      <div class="form-field">
        <label>Quantity</label>
        <input type="text" id="fQuantity" placeholder="Optional">
      </div>
      <div class="form-field">
        <label>Status</label>
        <select id="fStatus">
          <option value="given">Given</option>
          <option value="returned">Returned</option>
        </select>
      </div>
    </div>
    <div class="form-field">
      <label>Details / Description</label>
      <textarea id="fDetails" placeholder="Item details, notes, or handover remarks..."></textarea>
    </div>
    <div class="form-field">
      <label>Upload Pictures</label>
      <div class="upload-box">
        <input type="file" id="fPictures" accept="image/*" multiple onchange="previewUploads(this.files)">
        <div class="preview-grid" id="previewGrid"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveItem()">Save Item</button>
    </div>
  </div>
</div>

<div class="wrap">
  <header class="topbar">
    <div class="tl">
      <a href="/p/{{ country_id }}/{{ project_id }}/{{ category }}/" class="back" onclick="return goBack(event, this.href)">← {{ category|title }}</a>
      <div class="page-title">📦 <span>Store</span> — {{ project.name }}</div>
    </div>
    <div class="topbar-actions">
      <button class="act-btn btn-new" onclick="openNew()">+ Add Item</button>
    </div>
  </header>

  <div class="main">
    <div class="table-wrap">
      <table class="store-table">
        <thead>
          <tr>
            <th>Equipment</th><th>Date</th><th>Details</th><th>Quantity</th><th>Pictures</th><th>Status</th><th></th>
          </tr>
        </thead>
        <tbody id="storeBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const CID='{{ country_id }}', PID='{{ project_id }}', CAT='{{ category }}';
const API=`/api/p/${CID}/${PID}/${CAT}/store/`;
let items={{ store_items_json|safe }};
let keepPictures=[];

const canvas=document.getElementById('cv'),c=canvas.getContext('2d');let W,H;
const DOTS=Array.from({length:35},()=>({x:Math.random()*2000,y:Math.random()*1200,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,r:Math.random()*1.2+.3,a:Math.random()*.12+.03}));
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}resize();window.addEventListener('resize',resize);
(function draw(){c.clearRect(0,0,W,H);DOTS.forEach(p=>{p.x=(p.x+p.vx+W)%W;p.y=(p.y+p.vy+H)%H;c.beginPath();c.arc(p.x,p.y,p.r,0,Math.PI*2);c.fillStyle=`rgba(239,68,68,${p.a})`;c.fill()});requestAnimationFrame(draw)})();

function csrf(){return document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('csrftoken='))?.split('=')[1]||''}
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type;t.style.display='block';clearTimeout(t._t);t._t=setTimeout(()=>t.style.display='none',3400)}
function goBack(event, fallback){try{if(document.referrer){const prev=new URL(document.referrer, window.location.origin);if(prev.origin===window.location.origin){event.preventDefault();window.history.back();return false;}}}catch(_){ }return true;}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}

function renderTable(){
  const body=document.getElementById('storeBody');
  if(!items.length){
    body.innerHTML=`<tr><td colspan="7"><div class="empty-state"><div class="ico">📦</div><p>No store items yet. Add the first record.</p></div></td></tr>`;
    return;
  }
  body.innerHTML='';
  items.forEach(item=>{
    const pics=(item.pictures||[]).slice(0,3).map(src=>`<img src="${src}" alt="">`).join('');
    const extra=(item.pictures||[]).length>3?`<span style="font-size:11px;color:var(--tm)">+${item.pictures.length-3}</span>`:'';
    const tr=document.createElement('tr');
    tr.innerHTML=`
      <td><div class="item-name">${esc(item.equipment_name)}</div></td>
      <td>${esc(item.date||'—')}</td>
      <td><div class="item-details">${esc(item.details||'—')}</div></td>
      <td>${esc(item.quantity||'—')}</td>
      <td><div class="thumbs">${pics||'<span style="font-size:11.5px;color:var(--tm)">No pictures</span>'}${extra}</div></td>
      <td><span class="status-badge status-${item.status}">${item.status==='returned'?'Returned':'Given'}</span></td>
      <td><div class="row-actions"><button class="row-btn row-edit" onclick="openEdit('${item.id}')">Edit</button><button class="row-btn row-del" onclick="deleteItem('${item.id}')">Delete</button></div></td>
    `;
    body.appendChild(tr);
  });
}

function openNew(){
  document.getElementById('modalTitle').textContent='Add Store Item';
  document.getElementById('itemId').value='';
  document.getElementById('fName').value='';
  document.getElementById('fDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('fDetails').value='';
  document.getElementById('fQuantity').value='';
  document.getElementById('fStatus').value='given';
  document.getElementById('fPictures').value='';
  keepPictures=[];
  renderPreview([]);
  document.getElementById('storeModal').classList.add('open');
}

function openEdit(id){
  const item=items.find(x=>x.id===id); if(!item)return;
  document.getElementById('modalTitle').textContent='Edit Store Item';
  document.getElementById('itemId').value=id;
  document.getElementById('fName').value=item.equipment_name||'';
  document.getElementById('fDate').value=item.date||'';
  document.getElementById('fDetails').value=item.details||'';
  document.getElementById('fQuantity').value=item.quantity||'';
  document.getElementById('fStatus').value=item.status||'given';
  document.getElementById('fPictures').value='';
  keepPictures=[...(item.pictures||[])];
  renderPreview([]);
  document.getElementById('storeModal').classList.add('open');
}

function closeModal(){document.getElementById('storeModal').classList.remove('open')}
document.getElementById('storeModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeModal()});

function previewUploads(files){renderPreview(Array.from(files||[]))}
function renderPreview(newFiles){
  const grid=document.getElementById('previewGrid');
  const existing=keepPictures.map((src,idx)=>`<div class="preview-item"><img src="${src}" alt=""><button type="button" onclick="removeExisting(${idx})">×</button></div>`);
  const uploads=newFiles.map((file,idx)=>`<div class="preview-item"><img src="${URL.createObjectURL(file)}" alt=""></div>`);
  grid.innerHTML=[...existing,...uploads].join('');
}
function removeExisting(index){keepPictures.splice(index,1);renderPreview(Array.from(document.getElementById('fPictures').files||[]))}

async function saveItem(){
  const id=document.getElementById('itemId').value;
  const name=document.getElementById('fName').value.trim();
  const date=document.getElementById('fDate').value;
  if(!name||!date){toast('Equipment name and date are required','error');return}
  const fd=new FormData();
  fd.append('action', id?'update':'create');
  if(id) fd.append('id', id);
  fd.append('equipment_name', name);
  fd.append('date', date);
  fd.append('details', document.getElementById('fDetails').value.trim());
  fd.append('quantity', document.getElementById('fQuantity').value.trim());
  fd.append('status', document.getElementById('fStatus').value);
  keepPictures.forEach(pic=>fd.append('retain_pictures', pic));
  Array.from(document.getElementById('fPictures').files||[]).forEach(file=>fd.append('pictures', file));
  const r=await fetch(API,{method:'POST',headers:{'X-CSRFToken':csrf()},body:fd});
  const d=await r.json();
  if(d.ok){
    if(id){const i=items.findIndex(x=>x.id===id);if(i>=0)items[i]=d.item;}
    else items.unshift(d.item);
    renderTable();closeModal();toast(id?'Updated':'Item added');
  }else toast(d.error||'Error','error');
}

async function deleteItem(id){
  if(!confirm('Delete this store item?')) return;
  const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrf()},body:JSON.stringify({action:'delete',id})});
  const d=await r.json();
  if(d.ok){items=items.filter(x=>x.id!==id);renderTable();toast('Deleted')}
  else toast(d.error||'Error','error');
}

renderTable();
</script>
{% include 'core/includes/meeting_alerts_global.html' %}
</body>
</html>
