<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SJN Portal — HDEC HSE</title>
  <script>(function(){var t=localStorage.getItem('hdec-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #04060f; --text: #e8edf5; --text-muted: rgba(232,237,245,0.45);
      --border: rgba(255,255,255,0.08); --accent: #22c55e;
      --surface: rgba(255,255,255,0.03);
      --font-display: 'Plus Jakarta Sans', sans-serif; --font-body: 'Inter', sans-serif;
      --topbar-h: 56px;
    }
    html, body { height: 100%; overflow: hidden; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); display: flex; flex-direction: column; }

    /* ── TOPBAR ── */
    .topbar {
      height: var(--topbar-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
      background: rgba(4,6,15,.92);
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      z-index: 100;
    }
    .topbar-l { display: flex; align-items: center; gap: 14px; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 6px 14px; border-radius: 30px;
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text-muted); font-size: 12.5px; text-decoration: none;
      transition: all .2s;
    }
    .back-btn:hover { color: var(--text); border-color: rgba(34,197,94,.3); }
    .page-title {
      font-family: var(--font-display); font-size: 15px; font-weight: 700;
      color: var(--text); letter-spacing: -0.3px;
      display: flex; align-items: center; gap: 8px;
    }
    .page-title .cat-badge {
      padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
      background: rgba(34,197,94,.12); border: 1px solid rgba(34,197,94,.25);
      color: #22c55e; letter-spacing: .5px; text-transform: uppercase;
    }
    .topbar-r { display: flex; align-items: center; gap: 10px; }
    .user-pill {
      padding: 5px 13px; border-radius: 30px; font-size: 12px; font-weight: 600;
    }
    .user-pill.admin { border: 1px solid rgba(162,89,255,.3); background: rgba(162,89,255,.08); color: #c084fc; }
    .user-pill.viewer { border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); }
    .logout {
      padding: 5px 13px; border-radius: 30px;
      border: 1px solid rgba(239,68,68,.2); background: rgba(239,68,68,.07);
      color: #f87171; font-size: 12px; text-decoration: none; transition: all .2s;
    }
    .logout:hover { background: rgba(239,68,68,.13); }

    /* ── THEME TOGGLE ── */
    .theme-toggle { display:flex; align-items:center; gap:8px; background:none; border:none; cursor:pointer; padding:4px 2px; }
    .tt-label { font-size:10.5px; font-weight:700; color:var(--text-muted); letter-spacing:.7px; text-transform:uppercase; transition:color .3s; user-select:none; }
    .theme-toggle:hover .tt-label { color:var(--text); }
    .tt-track { width:44px; height:24px; border-radius:12px; position:relative; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14); transition:background .4s,border-color .4s; flex-shrink:0; }
    html[data-theme="light"] .tt-track { background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,146,60,.15)); border-color:rgba(251,191,36,.5); }
    .tt-thumb { position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:linear-gradient(135deg,#3b9eff,#00e5c8); box-shadow:0 2px 8px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; font-size:10px; line-height:1; transition:transform .38s cubic-bezier(.34,1.56,.64,1),background .38s; }
    html[data-theme="light"] .tt-thumb { transform:translateX(20px); background:linear-gradient(135deg,#fbbf24,#fb923c); box-shadow:0 2px 8px rgba(251,191,36,.5); }

    /* ── IFRAME ── */
    .portal-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    /* ── DAY MODE ── */
    html[data-theme="light"] { --bg:#eef1f8; --surface:rgba(0,0,0,.028); --border:rgba(0,0,0,.09); --text:#0d1728; --text-muted:rgba(13,23,40,.5); }
    html[data-theme="light"] .topbar { background:rgba(238,241,248,.96); border-bottom-color:rgba(0,0,0,.1); }
    html[data-theme="light"] .back-btn { color:rgba(13,23,40,.55); border-color:rgba(0,0,0,.1); background:rgba(0,0,0,.03); }
    html[data-theme="light"] .back-btn:hover { color:#0d1728; border-color:rgba(34,197,94,.4); }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-l">
      <a href="javascript:history.back()" class="back-btn">← Back</a>
      <span class="page-title">
        🌿 SJN Portal
        <span class="cat-badge">HSE</span>
      </span>
    </div>
    <div class="topbar-r">
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle day/night">
        <span class="tt-label" id="ttLabel">DARK</span>
        <div class="tt-track"><div class="tt-thumb">🌙</div></div>
      </button>
      {% if current_user %}
        <span class="user-pill {% if is_admin %}admin{% else %}viewer{% endif %}">
          {% if is_admin %}⚡{% else %}👤{% endif %}
          {{ current_user.username }}
        </span>
        <a href="/logout/" class="logout">Logout</a>
      {% endif %}
    </div>
  </header>

  <iframe
    class="portal-frame"
    src="/static/sjnportal/index.html"
    title="SJN O&M Portal"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals"
  ></iframe>

  <script>
    // ── Theme toggle ──
    (function(){
      var lbl = document.getElementById('ttLabel');
      var thumb = document.querySelector('.tt-thumb');
      function applyTheme(t){
        document.documentElement.setAttribute('data-theme', t);
        if(lbl){ lbl.textContent = t === 'light' ? 'LIGHT' : 'DARK'; }
        if(thumb){ thumb.textContent = t === 'light' ? '☀️' : '🌙'; }
      }
      applyTheme(localStorage.getItem('hdec-theme') || 'dark');
      window.toggleTheme = function(){
        var cur = document.documentElement.getAttribute('data-theme') || 'dark';
        var next = cur === 'dark' ? 'light' : 'dark';
        localStorage.setItem('hdec-theme', next);
        applyTheme(next);
      };
    })();
  </script>
</body>
</html>
