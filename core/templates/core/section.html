<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title }} — HDEC Al Henakiya</title>
  <script>(function(){var t=localStorage.getItem('hdec-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #04060f; --text: #e8edf5; --text-muted: rgba(232,237,245,0.45);
      --border: rgba(255,255,255,0.08); --accent: #3b9eff;
      --surface: rgba(255,255,255,0.03);
      --font-display: 'Syne', sans-serif; --font-body: 'DM Sans', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .topbar { position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 14px 40px; border-bottom: 1px solid var(--border); background: rgba(4,6,15,.85); backdrop-filter: blur(20px); z-index: 100; }
    .topbar-l { display: flex; align-items: center; gap: 10px; }
    .back-btn { padding: 7px 14px; border-radius: 30px; border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); font-size: 12.5px; text-decoration: none; transition: all .2s; }
    .back-btn:hover { color: var(--text); border-color: rgba(59,158,255,.3); }
    .topbar-r { display: flex; align-items: center; gap: 10px; }
    .user-pill { padding: 6px 13px; border-radius: 30px; font-size: 12px; font-weight: 600; }
    .user-pill.admin { border: 1px solid rgba(162,89,255,.3); background: rgba(162,89,255,.08); color: #c084fc; }
    .user-pill.viewer { border: 1px solid var(--border); background: var(--surface); color: var(--text-muted); }
    .logout { padding: 6px 13px; border-radius: 30px; border: 1px solid rgba(239,68,68,.2); background: rgba(239,68,68,.07); color: #f87171; font-size: 12px; text-decoration: none; }
    .center { text-align: center; animation: up .5s ease both; }
    .icon { font-size: 72px; margin-bottom: 24px; display: block; }
    h1 { font-family: var(--font-display); font-size: 52px; font-weight: 800; letter-spacing: -2px; margin-bottom: 14px; }
    .grad { background: linear-gradient(90deg, var(--accent), #00e5c8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    p { font-size: 17px; color: var(--text-muted); font-weight: 300; }
    .badge { margin-top: 32px; display: inline-block; padding: 8px 20px; border-radius: 30px; border: 1px solid rgba(59,158,255,.2); background: rgba(59,158,255,.06); color: var(--accent); font-size: 13px; }
    @keyframes up { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
    /* ── DAY MODE ── */
    html[data-theme="light"]{--bg:#f4f6fd;--surface:rgba(0,0,0,.028);--border:rgba(0,0,0,.09);--text:#0d1728;--text-muted:rgba(13,23,40,.5);}
    html[data-theme="light"] body{background:#f4f6fd}
    html[data-theme="light"] .topbar{background:rgba(244,246,253,.96)!important;border-bottom-color:rgba(0,0,0,.09)}
    html[data-theme="light"] .back-btn{color:rgba(13,23,40,.55);border-color:rgba(0,0,0,.1);background:rgba(0,0,0,.03)}
    /* TOGGLE */
    .theme-toggle{display:flex;align-items:center;gap:8px;background:none;border:none;cursor:pointer;padding:4px 2px}
    .tt-label{font-size:10.5px;font-weight:700;color:var(--text-muted);letter-spacing:.7px;text-transform:uppercase;transition:color .3s;user-select:none}
    .theme-toggle:hover .tt-label{color:var(--text)}
    .tt-track{width:48px;height:26px;border-radius:13px;position:relative;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);transition:background .4s,border-color .4s;flex-shrink:0}
    html[data-theme="light"] .tt-track{background:linear-gradient(135deg,rgba(251,191,36,.2),rgba(251,146,60,.15));border-color:rgba(251,191,36,.5)}
    .tt-thumb{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#3b9eff,#00e5c8);box-shadow:0 2px 8px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;font-size:11px;line-height:1;transition:transform .38s cubic-bezier(.34,1.56,.64,1),background .38s,box-shadow .38s}
    html[data-theme="light"] .tt-thumb{transform:translateX(22px);background:linear-gradient(135deg,#fbbf24,#fb923c);box-shadow:0 2px 8px rgba(251,191,36,.5)}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-l">
      <a href="/" class="back-btn">← Back to Hub</a>
    </div>
    <div class="topbar-r">
      <div class="user-pill {% if is_admin %}admin{% else %}viewer{% endif %}">
        {% if is_admin %}👑{% else %}👁{% endif %} {{ current_user.name }}
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
        <span class="tt-label" id="tt-label">Night</span>
        <span class="tt-track"><span class="tt-thumb"><span id="tt-icon">🌙</span></span></span>
      </button>
      <a href="/logout/" class="logout">Sign Out</a>
    </div>
  </header>
  <script>
  function toggleTheme(){const html=document.documentElement;const next=html.getAttribute('data-theme')==='light'?'dark':'light';html.setAttribute('data-theme',next);localStorage.setItem('hdec-theme',next);document.getElementById('tt-icon').textContent=next==='light'?'☀️':'🌙';document.getElementById('tt-label').textContent=next==='light'?'Day':'Night';}
  (function(){const t=localStorage.getItem('hdec-theme')||'dark';const icon=document.getElementById('tt-icon');const lbl=document.getElementById('tt-label');if(icon)icon.textContent=t==='light'?'☀️':'🌙';if(lbl)lbl.textContent=t==='light'?'Day':'Night';})();
  </script>
  <div class="center">
    <span class="icon">{{ icon }}</span>
    <h1 class="grad">{{ title }}</h1>
    <p>{{ description }}</p>
    <div class="badge">🚧 Module under development · Full UI coming soon</div>
  </div>
</body>
</html>
