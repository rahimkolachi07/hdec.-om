<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — HDEC 1100MW Al Henakiya</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #030711; --accent: #3b9eff; --a2: #00e5c8;
      --border: rgba(255,255,255,0.09); --surface: rgba(255,255,255,0.04);
      --text: #e2e8f5; --muted: rgba(226,232,245,0.5);
      --fd: 'Syne', sans-serif; --fb: 'DM Sans', sans-serif;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--fb);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow: hidden;
    }
    canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

    /* ── CARD ── */
    .card {
      position: relative; z-index: 1;
      width: min(420px, calc(100vw - 32px));
      background: rgba(6, 13, 26, 0.92);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 40px 40px;
      backdrop-filter: blur(30px);
      box-shadow: 0 0 80px rgba(59,158,255,0.09), 0 40px 100px rgba(0,0,0,0.55);
      animation: slideUp 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── LOGO ── */
    .logo { display: flex; align-items: center; gap: 13px; margin-bottom: 34px; }
    .logo-icon {
      width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--a2));
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }
    .logo-name { font-family: var(--fd); font-size: 21px; font-weight: 800; letter-spacing: -.5px; }
    .logo-name em { color: var(--accent); font-style: normal; }
    .logo-sub { font-size: 11.5px; color: var(--muted); margin-top: 2px; }

    /* ── HEADING ── */
    .card h2 { font-family: var(--fd); font-size: 27px; font-weight: 800; letter-spacing: -.8px; margin-bottom: 5px; }
    .card .sub { font-size: 13.5px; color: var(--muted); font-weight: 300; margin-bottom: 30px; }

    /* ── ERROR ── */
    .error-box {
      display: flex; align-items: center; gap: 9px;
      padding: 11px 15px; border-radius: 11px; margin-bottom: 20px;
      background: rgba(239,68,68,0.09); border: 1px solid rgba(239,68,68,0.28);
      color: #fca5a5; font-size: 13px; font-weight: 500;
      animation: shake 0.35s ease;
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      60%     { transform: translateX(5px); }
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 11.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.9px;
      color: var(--muted); margin-bottom: 7px;
    }
    .field input {
      display: block; width: 100%;
      padding: 13px 16px; border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text); font-size: 14.5px; font-family: var(--fb);
      outline: none; transition: border-color .2s, background .2s, box-shadow .2s;
    }
    .field input::placeholder { color: rgba(226,232,245,0.22); }
    .field input:focus {
      border-color: rgba(59,158,255,0.5);
      background: rgba(59,158,255,0.06);
      box-shadow: 0 0 0 3px rgba(59,158,255,0.10);
    }

    /* ── BUTTON ── */
    .btn {
      display: block; width: 100%; margin-top: 6px;
      padding: 14px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, #3b9eff, #1a52cc);
      color: #fff; font-size: 15px; font-weight: 600; font-family: var(--fb);
      cursor: pointer; letter-spacing: -.1px;
      transition: transform .18s, box-shadow .18s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(59,158,255,0.38); }
    .btn:active { transform: translateY(0); }

    /* ── HINT ── */
    .hint { text-align: center; font-size: 12px; color: rgba(226,232,245,0.22); margin-top: 22px; }
    .hint strong { color: rgba(226,232,245,0.42); }
  </style>
</head>
<body>
<canvas id="cv"></canvas>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div>
      <div class="logo-name">HD<em>EC</em></div>
      <div class="logo-sub">1100MW Al Henakiya Project</div>
    </div>
  </div>

  <h2>Welcome back</h2>
  <p class="sub">Sign in to access the project dashboard</p>

  {% if error %}
  <div class="error-box">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/login/">
    {% csrf_token %}
    <div class="field">
      <label for="username">Username</label>
      <input id="username" type="text" name="username"
             placeholder="Enter your username"
             autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" name="password"
             placeholder="••••••••"
             autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">Sign In →</button>
  </form>

  <p class="hint"> <strong></strong> / <strong></strong></p>
</div>

<script>
/* animated particle background */
const cv = document.getElementById('cv');
const cx = cv.getContext('2d');
let W, H;
const pts = Array.from({length: 55}, () => ({
  x: Math.random() * 1920, y: Math.random() * 1080,
  dx: (Math.random() - .5) * .32, dy: (Math.random() - .5) * .32,
  r: Math.random() * 1.3 + .3, a: Math.random() * .45 + .08
}));
function resize() { W = cv.width = innerWidth; H = cv.height = innerHeight; }
resize(); window.addEventListener('resize', resize);
function draw() {
  cx.clearRect(0, 0, W, H);
  cx.lineWidth = 1;
  cx.strokeStyle = 'rgba(59,158,255,0.025)';
  for (let x = 0; x < W; x += 90) { cx.beginPath(); cx.moveTo(x,0); cx.lineTo(x,H); cx.stroke(); }
  for (let y = 0; y < H; y += 90) { cx.beginPath(); cx.moveTo(0,y); cx.lineTo(W,y); cx.stroke(); }
  pts.forEach(p => {
    p.x += p.dx; p.y += p.dy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
    cx.beginPath(); cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    cx.fillStyle = `rgba(59,158,255,${p.a})`; cx.fill();
  });
  for (let i = 0; i < pts.length; i++) {
    for (let j = i+1; j < pts.length; j++) {
      const dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < 130) {
        cx.beginPath(); cx.moveTo(pts[i].x, pts[i].y); cx.lineTo(pts[j].x, pts[j].y);
        cx.strokeStyle = `rgba(59,158,255,${.045 * (1 - d/130)})`; cx.lineWidth = .7; cx.stroke();
      }
    }
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
